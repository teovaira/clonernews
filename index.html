<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- width=device-width is the baseline for the whole responsive layout. -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloneHN — a Hacker News reader</title>
  </head>
  <body>
    <!-- Lets keyboard and screen-reader users jump past the header straight to
         the feed; visually hidden until focused. -->
    <a class="skip-link" href="#feed">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="/">CloneHN</a>

      <!-- Shown only on narrow screens (CSS). aria-controls + aria-expanded let
           assistive tech announce that this button opens the feed nav and
           whether it is currently open; the bars span is decorative, so the
           accessible name comes from aria-label, not the glyph. -->
      <button
        id="nav-toggle"
        class="nav-toggle"
        aria-label="Show feeds"
        aria-controls="feed-nav"
        aria-expanded="false"
      >
        <span class="nav-toggle-bars" aria-hidden="true"></span>
      </button>

      <!-- aria-label distinguishes this from any other nav landmark; the feed
           handler in feed.js delegates clicks via the .feed-tab + data-feed
           pair, so those two contracts must stay on every tab. -->
      <nav id="feed-nav" class="feed-nav" aria-label="Story feeds">
        <button class="feed-tab" data-feed="top" aria-current="page">Top</button>
        <button class="feed-tab" data-feed="new">New</button>
        <button class="feed-tab" data-feed="ask">Ask</button>
        <button class="feed-tab" data-feed="show">Show</button>
        <button class="feed-tab" data-feed="job">Jobs</button>
      </nav>
    </header>

    <main id="main" class="layout">
      <!-- role=status + aria-live=polite announces new-item counts to screen
           readers without yanking focus. Starts hidden; showUpdateBanner()
           removes .hidden. A button (not a div) so it is keyboard-operable —
           the whole banner refreshes the current feed when activated. -->
      <button
        id="live-banner"
        class="live-banner hidden"
        role="status"
        aria-live="polite"
      >
        <span id="live-banner-text"></span>
      </button>

      <!-- role=feed is the ARIA pattern for a scrollable stream of articles;
           loadNextPage() appends .story-item cards here. -->
      <div id="feed" class="feed" role="feed" aria-busy="false"></div>

      <!-- Layout-only trip wire: initFeed observes it with IntersectionObserver
           to page in more posts. Hidden from the accessibility tree because it
           carries no content of its own. -->
      <div id="scroll-sentinel" aria-hidden="true"></div>
    </main>

    <!-- Right-side comment drawer. Every id below is the frozen contract that
         comments.js (Vasiliki) populates — they must never change. role=dialog
         + aria-modal mark it as an overlay; aria-labelledby names it by its
         story title for screen readers. Starts hidden. -->
    <aside
      id="comment-panel"
      class="comment-panel hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="comment-title"
    >
      <header class="comment-panel-header">
        <h2 id="comment-title" class="comment-title"></h2>
        <button id="close-comments" class="close-comments" aria-label="Close comments">
          &times;
        </button>
      </header>

      <div id="comment-meta" class="comment-meta"></div>
      <a id="comment-original-link" class="comment-original-link" href="#"></a>
      <div id="comment-text" class="comment-text"></div>

      <!-- Spinner shown while comments load; comments.js toggles it. -->
      <div id="comment-loader" class="comment-loader hidden" aria-hidden="true"></div>

      <!-- Root the recursive comment tree renders into. -->
      <div id="comments-container" class="comments-container"></div>
    </aside>

    <!-- The single entry module. type=module defers execution until the DOM is
         parsed, so app.js can safely bind initFeed on DOMContentLoaded. -->
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
